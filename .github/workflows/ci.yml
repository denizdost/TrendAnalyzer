name: CI Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8
      - run: flake8 analysis.py app.py --max-line-length=120 --extend-ignore=E501,F401 --exclude=data/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python data/generate_data.py
      - run: python -m coverage run -m unittest tests/test_analysis.py
      - run: python -m coverage report --include=analysis.py --fail-under=70
